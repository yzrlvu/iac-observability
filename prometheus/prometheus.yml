global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3001']

  - job_name: frontend
    metrics_path: /metrics
    static_configs:
      - targets: ['frontend:8080']
